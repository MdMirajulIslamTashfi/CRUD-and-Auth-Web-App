<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Verify Google Sign-In — UserSystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f0e8;
            --surface: #ffffff;
            --surface2: #faf7f2;
            --text: #1a1612;
            --muted: #7a7169;
            --accent: #c8622a;
            --accent2: #af5424;
            --accent-light: #f5e8df;
            --border: #ddd4c8;
            --success: #2d6a4f;
            --danger: #b83232;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-24px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        @keyframes pulse-ring {
            0%   { transform: scale(1); opacity: .5; }
            100% { transform: scale(2); opacity: 0; }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-14px); }
        }
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }
        @keyframes countdown {
            from { stroke-dashoffset: 0; }
            to   { stroke-dashoffset: 163; }
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 32px 16px;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; pointer-events: none;
            background-image: radial-gradient(circle, rgba(200,98,42,.09) 1px, transparent 1px);
            background-size: 30px 30px;
            mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 80%);
        }

        .bg-blob { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; }
        .blob-1  { width: 450px; height: 450px; background: rgba(200,98,42,.09); top: -80px; right: -60px; }
        .blob-2  { width: 300px; height: 300px; background: rgba(200,98,42,.06); bottom: -40px; left: -40px; }

        .wrap {
            position: relative; z-index: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            width: 100%; max-width: 900px;
            min-height: 540px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 24px 80px rgba(26,22,18,.14);
            animation: fadeUp .6s ease both;
        }

        /* ── LEFT PANEL ───────────────────────────────────────────────────── */
        .panel-left {
            background: linear-gradient(145deg, #c8622a 0%, #e8874a 60%, #af5424 100%);
            padding: 56px 48px;
            display: flex; flex-direction: column; justify-content: space-between;
            color: #fff;
            position: relative; overflow: hidden;
        }
        .panel-left::before {
            content: '';
            position: absolute;
            width: 320px; height: 320px; border-radius: 50%;
            border: 50px solid rgba(255,255,255,.08);
            top: -80px; right: -80px;
            animation: spin-slow 30s linear infinite;
        }
        .panel-left::after {
            content: '';
            position: absolute;
            width: 200px; height: 200px; border-radius: 50%;
            border: 30px solid rgba(255,255,255,.06);
            bottom: -40px; left: -40px;
        }

        .panel-badge {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 11px; text-transform: uppercase; letter-spacing: .14em;
            background: rgba(255,255,255,.15); border-radius: 99px;
            padding: 5px 12px; width: fit-content;
            position: relative; z-index: 1;
        }
        .panel-badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #fff; position: relative; }
        .panel-badge-dot::after {
            content: ''; position: absolute; inset: -3px;
            border-radius: 50%; border: 2px solid rgba(255,255,255,.6);
            animation: pulse-ring 2s ease-out infinite;
        }

        .panel-title {
            font-family: 'Fraunces', serif;
            font-size: 44px; font-weight: 600; line-height: 1.05;
            position: relative; z-index: 1;
        }
        .panel-title em { font-style: italic; font-weight: 300; }

        .panel-features {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; gap: 14px;
        }
        .panel-feature { display: flex; align-items: center; gap: 12px; font-size: 13px; opacity: .85; }
        .feature-icon {
            width: 32px; height: 32px; border-radius: 8px;
            background: rgba(255,255,255,.15);
            display: grid; place-items: center;
            font-size: 15px; flex-shrink: 0;
        }

        .floating-emoji {
            position: absolute; font-size: 28px;
            animation: float 4s ease-in-out infinite;
            z-index: 2; user-select: none;
        }
        .em-1 { bottom: 90px; right: 40px; animation-delay: 0s; }
        .em-2 { top: 120px; right: 60px; animation-delay: 1.5s; font-size: 20px; }

        /* ── RIGHT PANEL ──────────────────────────────────────────────────── */
        .panel-right {
            background: var(--surface);
            padding: 56px 48px;
            display: flex; flex-direction: column; justify-content: center;
        }

        .brand {
            font-family: 'Fraunces', serif; font-style: italic;
            font-size: 12px; letter-spacing: .12em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 28px;
            display: flex; align-items: center; gap: 6px;
        }
        .brand-dot-sm { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

        /* Google badge at top of form */
        .google-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: var(--surface2); border: 1.5px solid var(--border);
            border-radius: 99px; padding: 5px 12px;
            font-size: 12px; color: var(--muted);
            margin-bottom: 20px; width: fit-content;
        }
        .google-badge svg { width: 14px; height: 14px; }

        .form-title {
            font-family: 'Fraunces', serif;
            font-size: 30px; font-weight: 600; margin-bottom: 6px;
        }
        .form-sub { font-size: 13px; color: var(--muted); margin-bottom: 8px; line-height: 1.6; }
        .form-sub strong { color: var(--text); font-weight: 500; }

        /* Alerts */
        .alert {
            padding: 11px 14px; border-radius: 10px;
            font-size: 13px; margin-bottom: 18px;
            border-left: 3px solid; line-height: 1.5;
        }
        .alert-error   { background: rgba(184,50,50,.07); border-color: var(--danger); color: var(--danger); }
        .alert-success { background: rgba(45,106,79,.07);  border-color: var(--success); color: var(--success); }

        /* OTP input row */
        .field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 18px; animation: slideIn .4s ease both; }

        label {
            font-size: 11px; font-weight: 500; letter-spacing: .08em;
            text-transform: uppercase; color: var(--muted);
        }

        /* Large centred OTP input */
        .otp-input-wrap { position: relative; }
        input[name="otp"] {
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 26px; font-weight: 500;
            letter-spacing: .35em;
            padding: 14px 20px;
            outline: none;
            transition: all .18s;
            width: 100%;
            text-align: center;
        }
        input[name="otp"]:focus {
            background: #fff;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(200,98,42,.11);
        }
        input[name="otp"]:hover:not(:focus) { border-color: #c5bbb0; }

        /* Countdown ring */
        .timer-wrap {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; margin-bottom: 18px;
        }
        .timer-ring { width: 38px; height: 38px; transform: rotate(-90deg); }
        .timer-ring-bg  { fill: none; stroke: var(--border); stroke-width: 3; }
        .timer-ring-bar {
            fill: none; stroke: var(--accent); stroke-width: 3;
            stroke-linecap: round;
            stroke-dasharray: 163;
            stroke-dashoffset: 0;
            animation: countdown 60s linear forwards;
        }
        .timer-text { font-size: 12px; color: var(--muted); }
        .timer-text span { font-weight: 500; color: var(--accent); }

        /* Buttons */
        .btn-primary {
            width: 100%; padding: 13px; margin-top: 4px;
            background: linear-gradient(135deg, var(--accent), #e8874a);
            color: #fff; border: none; border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px; font-weight: 500; letter-spacing: .04em;
            cursor: pointer; transition: all .2s;
            box-shadow: 0 4px 16px rgba(200,98,42,.28);
            position: relative; overflow: hidden;
        }
        .btn-primary::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
            transform: translateX(-100%); transition: transform .4s ease;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,98,42,.38); }
        .btn-primary:hover::after { transform: translateX(100%); }
        .btn-primary:active { transform: translateY(0); }

        .resend-row {
            text-align: center; margin-top: 18px;
            font-size: 13px; color: var(--muted);
        }
        .btn-resend {
            background: none; border: none; padding: 0;
            color: var(--accent); font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 500; cursor: pointer;
            text-decoration: none; transition: opacity .15s;
        }
        .btn-resend:hover { text-decoration: underline; }

        .back-link {
            text-align: center; margin-top: 14px;
            font-size: 13px; color: var(--muted);
        }
        .back-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .back-link a:hover { text-decoration: underline; }

        /* Responsive */
        @media (max-width: 700px) {
            .wrap { grid-template-columns: 1fr; min-height: auto; }
            .panel-left { min-height: 220px; padding: 36px 28px; }
            .panel-title { font-size: 32px; }
            .panel-features { display: none; }
            .panel-right { padding: 36px 28px; }
        }
    </style>
</head>
<body>

<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>

<div class="wrap">

    <!-- LEFT panel -->
    <div class="panel-left">
        <div class="panel-badge">
            <div class="panel-badge-dot"></div>
            UserSystem
        </div>

        <div class="panel-title">
            Almost<br/><em>there.</em>
        </div>

        <div class="panel-features">
            <div class="panel-feature">
                <div class="feature-icon">📧</div>
                <span>OTP sent to your Gmail</span>
            </div>
            <div class="panel-feature">
                <div class="feature-icon">⏱️</div>
                <span>Code expires in 60 seconds</span>
            </div>
            <div class="panel-feature">
                <div class="feature-icon">🛡️</div>
                <span>Extra layer of security</span>
            </div>
        </div>

        <div class="floating-emoji em-1">🔐</div>
        <div class="floating-emoji em-2">✨</div>
    </div>

    <!-- RIGHT form panel -->
    <div class="panel-right">
        <div class="brand">
            <div class="brand-dot-sm"></div>
            UserSystem
        </div>

        <!-- Google badge -->
        <div class="google-badge">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google Sign-In Verification
        </div>

        <h2 class="form-title">Check your inbox</h2>
        <p class="form-sub">
            We sent a 6-digit code to<br/>
            <strong th:text="${maskedEmail}">jo****@gmail.com</strong>
        </p>

        <!-- Alerts -->
        <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Countdown timer -->
        <div class="timer-wrap">
            <svg class="timer-ring" viewBox="0 0 56 56">
                <circle class="timer-ring-bg"  cx="28" cy="28" r="26"/>
                <circle class="timer-ring-bar" cx="28" cy="28" r="26"/>
            </svg>
            <span class="timer-text">Expires in <span id="countdown">60</span>s</span>
        </div>

        <!-- OTP form -->
        <form th:action="@{/verify-google-otp}" th:object="${dto}" method="post">
            <div class="field" style="animation-delay:.1s">
                <label for="otp">One-Time Password</label>
                <div class="otp-input-wrap">
                    <input id="otp" type="text" name="otp"
                           th:field="*{otp}"
                           placeholder="· · · · · ·"
                           maxlength="6"
                           inputmode="numeric"
                           autocomplete="one-time-code"
                           autofocus required/>
                </div>
            </div>

            <button class="btn-primary" type="submit">Verify &amp; Sign In →</button>
        </form>

        <!-- Resend -->
        <div class="resend-row">
            Didn't receive it?
            <form th:action="@{/verify-google-otp/resend}" method="post" style="display:inline">
                <button type="submit" class="btn-resend">Resend code</button>
            </form>
        </div>

        <div class="back-link">
            <a href="/login">← Back to Sign In</a>
        </div>
    </div>
</div>

<script>
    // Countdown timer
    let seconds = 60;
    const el = document.getElementById('countdown');
    const bar = document.querySelector('.timer-ring-bar');

    const tick = setInterval(() => {
        seconds--;
        if (el) el.textContent = seconds;
        if (seconds <= 0) {
            clearInterval(tick);
            if (el) el.textContent = '0';
        }
    }, 1000);

    // Only allow digits in OTP field
    const otpInput = document.getElementById('otp');
    if (otpInput) {
        otpInput.addEventListener('input', () => {
            otpInput.value = otpInput.value.replace(/\D/g, '').slice(0, 6);
        });
    }
</script>
</body>
</html>
