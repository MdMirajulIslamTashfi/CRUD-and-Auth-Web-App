<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>OTP Verification — UserSystem</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300;1,9..144,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f0e8;
            --surface: #ffffff;
            --surface2: #faf7f2;
            --text: #1a1612;
            --muted: #7a7169;
            --accent: #c8622a;
            --accent2: #af5424;
            --accent-light: #f5e8df;
            --border: #ddd4c8;
            --success: #2d6a4f;
            --danger: #b83232;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes boxIn {
            from { opacity: 0; transform: scale(.7) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-6px); }
            40%, 80% { transform: translateX(6px); }
        }
        @keyframes pulse-ring {
            0%   { transform: scale(1); opacity: .5; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        @keyframes drift {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50%       { transform: translateY(-20px) rotate(3deg); }
        }
        @keyframes countdown-tick {
            0%   { transform: scale(1.1); color: var(--accent); }
            100% { transform: scale(1); }
        }
        @keyframes success-bounce {
            0%, 100% { transform: scale(1); }
            50%       { transform: scale(1.05); }
        }

        body {
            min-height: 100vh;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            padding: 32px 24px;
            font-family: 'DM Sans', sans-serif;
            color: var(--text);
            position: relative; overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; pointer-events: none;
            background-image: radial-gradient(circle, rgba(200,98,42,.10) 1px, transparent 1px);
            background-size: 26px 26px;
        }

        .bg-blob {
            position: fixed; border-radius: 50%; filter: blur(80px);
            pointer-events: none; z-index: 0;
        }
        .blob-1 { width: 420px; height: 420px; background: rgba(200,98,42,.10); top: -80px; right: -70px; animation: drift 18s ease-in-out infinite; }
        .blob-2 { width: 300px; height: 300px; background: rgba(200,98,42,.07); bottom: -60px; left: -60px; animation: drift 22s ease-in-out infinite reverse; }

        /* Top bar */
        .topbar {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            height: 60px; background: rgba(245,240,232,.92);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 32px;
        }
        .topbar-brand {
            font-family: 'Fraunces', serif; font-size: 18px; font-weight: 600;
            text-decoration: none; color: var(--text);
            display: flex; align-items: center; gap: 8px;
        }
        .topbar-brand span { color: var(--accent); }
        .brand-dot {
            width: 7px; height: 7px; border-radius: 50%; background: var(--accent);
            position: relative;
        }
        .brand-dot::after {
            content: ''; position: absolute; inset: -3px;
            border-radius: 50%; border: 2px solid var(--accent);
            opacity: .4; animation: pulse-ring 2s ease-out infinite;
        }

        /* CARD */
        .card {
            position: relative; z-index: 1;
            width: 100%; max-width: 600px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 28px; padding: 52px 44px;
            box-shadow: 0 20px 60px rgba(0,0,0,.08);
            margin-top: 30px;
            animation: fadeUp .6s ease both;
        }
        .card::before {
            content: '';
            position: absolute; top: 0; left: 18px; right: 18px; height: 3px;
            background: linear-gradient(90deg, var(--accent), #e8874a, var(--accent));
        }

        /* Icon */
        .otp-icon {
            width: 64px; height: 64px; border-radius: 18px;
            background: var(--accent-light); border: 2px solid rgba(200,98,42,.2);
            display: grid; place-items: center;
            font-size: 28px;
            margin: 0 auto 24px;
            position: relative;
        }
        .otp-icon::after {
            content: ''; position: absolute; inset: -6px;
            border-radius: 22px; border: 2px solid rgba(200,98,42,.15);
        }

        h2 {
            font-family: 'Fraunces', serif; font-size: 30px; font-weight: 600;
            color: var(--text); margin-bottom: 10px; line-height: 1.1;
            text-align: center;
        }

        .subtitle {
            color: var(--muted); font-size: 14px; line-height: 1.7;
            margin-bottom: 36px; text-align: center;
        }

        /* OTP Boxes */
        .otp-container {
            display: flex; justify-content: center; align-items: center;
            gap: 10px; margin-bottom: 30px;
        }

        .otp-box {
            width: 54px; height: 64px;
            border-radius: 14px;
            border: 2px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            font-size: 26px; font-weight: 500;
            font-family: 'Fraunces', serif;
            text-align: center;
            outline: none;
            transition: all .18s;
            animation: boxIn .4s ease both;
        }
        .otp-box:nth-child(1) { animation-delay: .05s; }
        .otp-box:nth-child(2) { animation-delay: .10s; }
        .otp-box:nth-child(3) { animation-delay: .15s; }
        .otp-box:nth-child(4) { animation-delay: .20s; }
        .otp-box:nth-child(5) { animation-delay: .25s; }
        .otp-box:nth-child(6) { animation-delay: .30s; }

        .otp-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(200,98,42,.12);
            background: #fff;
            transform: scale(1.06);
        }
        .otp-box.filled {
            border-color: var(--accent);
            background: var(--accent-light);
        }
        .otp-box.error-shake { animation: shake .4s ease; }

        /* Buttons */
        .btn-verify {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, var(--accent), #e8874a);
            color: #fff; border: none; border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px; font-weight: 500; letter-spacing: .04em;
            cursor: pointer;
            transition: all .2s;
            box-shadow: 0 4px 16px rgba(200,98,42,.28);
            position: relative; overflow: hidden;
        }
        .btn-verify::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
            transform: translateX(-100%); transition: transform .4s ease;
        }
        .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(200,98,42,.38); }
        .btn-verify:hover::after { transform: translateX(100%); }
        .btn-verify:active { transform: translateY(0); }

        .btn-resend {
            width: 100%; margin-top: 12px; padding: 12px;
            background: var(--surface); color: var(--text);
            border: 1.5px solid var(--border); border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px; cursor: pointer;
            transition: all .2s;
        }
        .btn-resend:hover {
            border-color: var(--accent); color: var(--accent);
            background: var(--accent-light); transform: translateY(-1px);
        }

        /* Timer */
        .timer-wrap {
            margin-top: 20px; text-align: center;
        }
        .timer-ring {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--muted);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 99px; padding: 6px 16px;
        }
        #countdown {
            color: var(--accent); font-weight: 600; font-size: 15px;
            font-family: 'Fraunces', serif;
            min-width: 38px;
            transition: color .3s;
        }
        #countdown.urgent { color: var(--danger); }

        .expired {
            margin-top: 12px; text-align: center;
            color: var(--danger); font-size: 13px; line-height: 1.5;
        }

        .error {
            margin-top: 18px; padding: 12px 16px; border-radius: 10px;
            background: rgba(184,50,50,.08);
            border: 1px solid rgba(184,50,50,.2);
            color: var(--danger); font-size: 14px; text-align: center;
        }

        /* Progress dots */
        .otp-dots {
            display: flex; justify-content: center; gap: 4px; margin-bottom: 8px;
        }
        .otp-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--border); transition: background .2s;
        }
        .otp-dot.filled { background: var(--accent); }

        @media (max-width: 480px) {
            .card { padding: 40px 22px; }
            h2 { font-size: 26px; }
            .otp-container { gap: 7px; }
            .otp-box { width: 46px; height: 56px; font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="bg-blob blob-1"></div>
<div class="bg-blob blob-2"></div>

<nav class="topbar">
    <a href="/" class="topbar-brand">
        <div class="brand-dot"></div>
        User<span>System</span>
    </a>
</nav>

<div class="card">
    <div class="otp-icon">📬</div>

    <h2>Verify your<br/>email</h2>
    <div class="subtitle">
        We sent a 6-digit code to your email address.<br/>
        Enter it below to continue.
    </div>

    <div class="otp-dots">
        <div class="otp-dot" id="dot-0"></div>
        <div class="otp-dot" id="dot-1"></div>
        <div class="otp-dot" id="dot-2"></div>
        <div class="otp-dot" id="dot-3"></div>
        <div class="otp-dot" id="dot-4"></div>
        <div class="otp-dot" id="dot-5"></div>
    </div>

    <form th:action="@{/otp}" method="post" id="otpForm">
        <input type="hidden" name="otp" id="realOtp">

        <div class="otp-container">
            <input class="otp-box" maxlength="1" inputmode="numeric" autocomplete="one-time-code">
            <input class="otp-box" maxlength="1" inputmode="numeric">
            <input class="otp-box" maxlength="1" inputmode="numeric">
            <input class="otp-box" maxlength="1" inputmode="numeric">
            <input class="otp-box" maxlength="1" inputmode="numeric">
            <input class="otp-box" maxlength="1" inputmode="numeric">
        </div>

        <button type="submit" class="btn-verify">Verify Code →</button>
    </form>

    <form th:action="@{/otp/resend}" method="post">
        <button type="submit" class="btn-resend">↺ Resend Code</button>
    </form>

    <div class="timer-wrap">
        <div class="timer-ring">
            ⏱ Code expires in&nbsp;<span id="countdown">01:00</span>
        </div>
    </div>

    <div class="expired" id="expiredMessage"></div>

    <div class="error"
         th:if="${error}"
         th:text="${error}">
    </div>
</div>

<script>
    const boxes = document.querySelectorAll(".otp-box");
    const realOtp = document.getElementById("realOtp");
    const dots = document.querySelectorAll(".otp-dot");

    function updateHiddenInput() {
        let otp = "";
        boxes.forEach((box, i) => {
            otp += box.value;
            dots[i].classList.toggle("filled", box.value !== "");
            box.classList.toggle("filled", box.value !== "");
        });
        realOtp.value = otp;
    }

    function shiftLeftFrom(index) {
        for (let i = index; i < boxes.length - 1; i++) {
            boxes[i].value = boxes[i + 1].value;
        }
        boxes[boxes.length - 1].value = "";
    }

    boxes.forEach((box, index) => {
        box.addEventListener("input", (e) => {
            let value = e.target.value.replace(/\D/g, '');
            if (!value) { e.target.value = ""; updateHiddenInput(); return; }
            e.target.value = value[0];
            if (index < boxes.length - 1) boxes[index + 1].focus();
            updateHiddenInput();
        });

        box.addEventListener("keydown", (e) => {
            if (e.key === "Backspace") {
                if (box.value !== "") {
                    shiftLeftFrom(index);
                    updateHiddenInput();
                    e.preventDefault();
                } else if (index > 0) boxes[index - 1].focus();
            }
        });

        box.addEventListener("paste", (e) => {
            e.preventDefault();
            const pasted = (e.clipboardData || window.clipboardData)
                .getData("text").replace(/\D/g, '');
            if (!pasted) return;
            for (let i = 0; i < boxes.length; i++) boxes[i].value = pasted[i] || "";
            updateHiddenInput();
            boxes[Math.min(pasted.length, boxes.length - 1)].focus();
        });
    });

    // Countdown timer
    let timeLeft = 60;
    const countdown = document.getElementById("countdown");
    const expiredMessage = document.getElementById("expiredMessage");

    const timer = setInterval(() => {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        countdown.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if (timeLeft <= 10) countdown.classList.add("urgent");
        if (timeLeft <= 0) {
            clearInterval(timer);
            expiredMessage.innerHTML = "Code expired. Click <strong><em>Resend Code</em></strong> to get a new one.";
            countdown.textContent = "00:00";
        }
        timeLeft--;
    }, 1000);
</script>
</body>
</html>
